version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    volumes:
      - mongo_data:/data/db
    networks:
      - codex_net
    # do NOT publish 27017 to the host — only reachable via internal network

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: always
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/?authSource=admin"
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY}
      DEFAULT_DISCORD_URL: ${DEFAULT_DISCORD_URL}
      APP_NAME: ${APP_NAME}
      CORS_ORIGINS: ${PUBLIC_URL}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS}
      ENABLE_HSTS: "1"
    networks:
      - codex_net

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${PUBLIC_URL}
    restart: always
    networks:
      - codex_net

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/proxy_common.conf:/etc/nginx/conf.d/proxy_common.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    networks:
      - codex_net

networks:
  codex_net:
    driver: bridge

volumes:
  mongo_data:
