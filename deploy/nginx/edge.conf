# Edge Nginx — terminates TLS, proxies /api to backend and / to frontend
# Rate-limits noisy endpoints as a first DDoS line of defense.

limit_req_zone $binary_remote_addr zone=api_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_apply:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/s;

# Redirect HTTP → HTTPS (uncomment after you have certs in place)
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    # listen 443 ssl http2;
    server_name _;

    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 30m;

    # Login is the most sensitive endpoint
    location = /api/auth/login {
        limit_req zone=api_login burst=5 nodelay;
        proxy_pass http://backend:8001;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    location = /api/applications {
        limit_req zone=api_apply burst=3 nodelay;
        proxy_pass http://backend:8001;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=120 nodelay;
        proxy_pass http://backend:8001;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    location / {
        proxy_pass http://frontend:80;
        include /etc/nginx/conf.d/proxy_common.conf;
    }
}
